general {
    gaps_in = 4
    gaps_out = 10
    border_size = 4
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    resize_on_border = true
}

decoration {
    rounding = 22
    rounding_power = 12

    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false
        noise = 0.02
        contrast = 1.0
        brightness = 0.9
        popups = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1b2699)
        color_inactive = rgba(1a1b2633)
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = false
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = slave
    smart_resizing = true
}
