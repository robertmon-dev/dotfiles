add_newline = false
# Pipes ╰─ ╭─
# Powerline symbols                                    
# Wedges 🭧🭒 🭣🭧🭓
# Random noise 🬖🬥🬔🬗
# Cool stuff 󰜥   

# format = """
# $cmd_duration$username$hostname $directory $git_branch
# $character
# """
# Don't print a new line at the start of the prompt
format = """
$cmd_duration 󰜥 $directory$git_branch
$character"""

# Replace the "❯" symbol in the prompt with "➜"
[character]
success_symbol = "[  ](bold fg:#7aa2f7)"
error_symbol = "[  ](bold fg:#f7768e)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg:#7dcfff"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = "󰜥 [](bold fg:#7dcfff)[$symbol $branch(:$remote_branch)](fg:#24283b bg:#7dcfff)[](bold fg:#7dcfff)"

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold #f7768e)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 ‍"
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](fg:#9ece6a)'
renamed = " ✍️ "
deleted = " 🗑 "

[hostname]
ssh_only = false
format = "[•$hostname](bg:#7dcfff bold fg:#24283b)[](bold fg:#7dcfff)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold #9ece6a"

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:#7dcfff fg:#24283b"
style_root = "#f7768e bold"
format = "[](bold fg:#7dcfff)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "  "
read_only = "  "
style = "bg:#9ece6a fg:#24283b"
truncation_length = 6
truncation_symbol = " ••/"
format = '[](bold fg:#9ece6a)[󰉋 $path]($style)[](bold fg:#9ece6a)'


[directory.substitutions]
"Desktop" = "  "
"Documents" = "  "
"Downloads" = "  "
"Music" = " 󰎈 "
"Pictures" = "  "
"Videos" = "  "
"GitHub" = " 󰊤 "

[cmd_duration]
min_time = 0
format = '[](bold fg:#e0af68)[󰪢 $duration](bold bg:#e0af68 fg:#24283b)[](bold fg:#e0af68)'
